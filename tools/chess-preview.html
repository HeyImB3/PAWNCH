<!DOCTYPE html><html><head><meta charset="utf-8"><title>PAWNCH chess preview</title>
<style>body{background:#181828;color:#cdd6ff;font:12px monospace;margin:12px}
canvas{image-rendering:pixelated;width:768px;height:672px;border:1px solid #3a4a78}</style>
</head><body>
<div>chess-panel QA — params: ?bare=1 (no assets) ?low=1 (8s clock) ?check=1 (check position)</div>
<canvas id="cv" width="512" height="448"></canvas>
<script type="module">
import { loadAssets } from '../src/assets.js';
import { FX } from '../src/gfx.js';
import { input } from '../src/input.js';
import * as Chess from '../src/chess/board.js';
import { ChessState } from '../src/states/chess.js';
import { WalkState } from '../src/states/walk.js';
import { OPPONENTS } from '../src/opponents.js';

const params = new URLSearchParams(location.search);
if (!params.has('bare')) await loadAssets('../assets/sprites');

const pgn = [];
const chess = params.has('check')
  ? Chess.loadFen('rnb1kbnr/pppp1ppp/8/4p3/6Pq/5P2/PPPPP2P/RNBQKBNR w KQkq - 1 3')
  : (() => {                                   // 1.e4 d5 2.exd5 Qxd5 — two captures
      let s = Chess.newGame();
      for (const [from, to] of [[52, 36], [11, 27], [36, 27], [3, 27]]) {
        const mv = Chess.legalMoves(s).find((m) => m.from === from && m.to === to);
        pgn.push(Chess.moveLabel(s, mv));
        s = Chess.applyMove(s, mv);
      }
      return s;
    })();

const match = {
  mode: 'story', opponent: OPPONENTS[4], playerColor: Chess.WHITE,
  chess, round: 3, hp: { player: 62, enemy: 78 },
  clocks: { w: params.has('low') ? 8000 : 174000, b: 231000 },
  pgnMoves: pgn, fightTrack: 0, movedThisHalf: {},
  damage: params.has('dmg') ? { player: 380, enemy: 150 } : { player: 0, enemy: 0 },
};
const game = { W: 512, H: 448, match, save: {}, input, fx: new FX(),
  doFreeze() {}, resolveChess() {}, changeState() {}, netFlow() {} };
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
// ?walk=1 previews the walk-to-the-board state instead (same mock match)
const st = params.has('walk') ? new WalkState() : new ChessState();
st.enter(game);
let last = performance.now();
(function frame(now) {
  const dt = Math.min(50, now - last); last = now;
  st.update(game, dt);
  game.fx.update();
  ctx.fillStyle = '#070a16'; ctx.fillRect(0, 0, 512, 448);
  st.draw(game, ctx);
  game.fx.draw(ctx);
  if (params.has('perf')) {
    window.__ft = window.__ft || [];
    window.__ft.push(dt);
    if (window.__ft.length > 60) window.__ft.shift();
    const avg = window.__ft.reduce((a, b) => a + b, 0) / window.__ft.length;
    ctx.fillStyle = '#39d98a';
    ctx.fillText(avg.toFixed(1) + 'ms ' + Math.round(1000 / avg) + 'fps', 6, 10);
  }
  requestAnimationFrame(frame);
})(last);
</script></body></html>
